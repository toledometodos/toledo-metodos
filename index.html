<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Toledo Métodos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #000000, #050505);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 40px 20px;
    }

    .logo {
      font-size: 34px;
      font-weight: 800;
      color: #00ff88;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,255,136,0.7);
      margin-bottom: 10px;
    }

    .verified {
      font-size: 12px;
      color: #00ff88;
      margin-bottom: 20px;
    }

    .headline {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 25px;
    }

    .proof {
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.3);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .btn {
      display: block;
      padding: 16px;
      margin: 14px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .primary {
      background: linear-gradient(45deg, #00ff88, #00cc66);
      color: black;
      box-shadow: 0 0 25px rgba(0,255,136,0.6);
      animation: pulse 1.5s infinite;
    }

    .primary:hover {
      transform: scale(1.05);
    }

    .secondary {
      border: 1px solid #00ff88;
      color: #00ff88;
      background: transparent;
    }

    .secondary:hover {
      background: #00ff88;
      color: black;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(0,255,136,0.4); }
      50% { box-shadow: 0 0 30px rgba(0,255,136,0.9); }
      100% { box-shadow: 0 0 10px rgba(0,255,136,0.4); }
    }

    .divider {
      margin: 25px 0;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    footer {
      margin-top: 20px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- NOME FORTE -->
  <div class="logo">TOLEDO MÉTODOS</div>
  <div class="verified">✔ Plataforma Oficial</div>

  <div class="headline">
    Método validado para gerar resultados reais<br>
    <strong>Comece agora</strong>
  </div>

  <!-- PROVA SOCIAL -->
  <div class="proof">
    +1.200 pessoas já entraram 🚀<br>
    Acesso liberado por tempo limitado
  </div>

  <!-- BOTÃO PRINCIPAL -->
  <a class="btn primary" href="https://t.me/toledometodos" target="_blank">
    💰 ENTRAR NO TELEGRAM AGORA
  </a>

  <div class="divider"></div>

  <!-- BOTÕES SECUNDÁRIOS -->
  <a class="btn secondary" href="#">
    📈 Ver resultados
  </a>

  <a class="btn secondary" href="#">
    🎯 Como funciona
  </a>

  <a class="btn secondary" href="#">
    📲 Suporte
  </a>

  <footer>
    © 2026 Toledo Métodos — Todos os direitos reservados
  </footer>

</div>

</body>
</html>
