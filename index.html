<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Toledo Métodos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: 
        linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
        url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc'),
        url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a');
      background-size: cover;
      background-blend-mode: overlay;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 40px 20px;
    }

    .logo {
      font-size: 36px;
      font-weight: 900;
      color: #00ff88;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(0,255,136,0.9);
      margin-bottom: 10px;
    }

    .equipe {
      font-size: 13px;
      margin-bottom: 25px;
      color: #ccc;
    }

    /* T SUPER CHAMATIVO */
    .equipe span {
      color: #00ff88;
      font-weight: bold;
      font-size: 18px;
      animation: neon 1s infinite alternate;
    }

    @keyframes neon {
      from { text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88; }
      to { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; }
    }

    .headline {
      font-size: 15px;
      color: #ccc;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .proof {
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.3);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    /* BOTÃO PRINCIPAL EXTREMAMENTE CHAMATIVO */
    .btn-primary {
      display: block;
      padding: 18px;
      margin: 18px 0;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      font-size: 17px;
      background: linear-gradient(45deg, #00ff88, #00cc66);
      color: black;
      animation: pulse 1s infinite;
      box-shadow: 0 0 30px rgba(0,255,136,1);
    }

    .btn-primary:hover {
      transform: scale(1.08);
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 15px #00ff88; }
      50% { transform: scale(1.08); box-shadow: 0 0 40px #00ff88; }
      100% { transform: scale(1); box-shadow: 0 0 15px #00ff88; }
    }

    /* BOTÃO SECUNDÁRIO MENOS IMPORTANTE */
    .btn-secondary {
      display: block;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-size: 14px;
    }

    .btn-secondary:hover {
      background: #00ff88;
      color: black;
    }

    /* INDICADOR DE URGÊNCIA */
    .live {
      font-size: 12px;
      color: #00ff88;
      margin-bottom: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    footer {
      margin-top: 25px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">TOLEDO MÉTODOS</div>

  <div class="equipe">
    Equipe <span>T</span>
  </div>

  <div class="headline">
    Trabalhamos com métodos <strong>zero riscos</strong><br>
    Especialistas em <strong>delay esportivo</strong>
  </div>

  <div class="proof">
    +1.200 pessoas já acessaram 🚀<br>
    Vagas limitadas hoje
  </div>

  <!-- URGÊNCIA -->
  <div class="live">● 87 pessoas acessando agora</div>

  <!-- BOTÃO PRINCIPAL -->
  <a class="btn-primary" href="https://t.me/toledometodos" target="_blank">
    💰 ACESSAR AGORA NO TELEGRAM
  </a>

  <!-- SUPORTE -->
  <a class="btn-secondary" href="https://l.instagram.com/?u=https%3A%2F%2Fwa.me%2Fmessage%2FEF3UGFYGAMRUA1&e=AT7KhJ_f6GJGIYMfzGrTXJOKSsxkDZfz0JaL5jnEzKySgatbIf4Vq3uGmasSubv2cKOmoIMTUXbeAM9XZIxgX-2n4S51HdFiLDKYNdsF-RoBZMD2_qiP-hLdF4SIucv3k1v3E4UJAUrV" target="_blank">
    📲 Suporte
  </a>

  <footer>
    © 2026 Toledo Métodos
  </footer>

</div>

</body>
</html>
