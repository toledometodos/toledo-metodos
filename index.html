<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Toledo Métodos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: 
        linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
        url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc');
      background-size: cover;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 30px 20px;
    }

    /* IMAGEM PRINCIPAL */
    .logo-img {
      width: 100%;
      max-width: 280px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(0,255,136,0.9);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .equipe {
      font-size: 14px;
      margin-bottom: 20px;
      color: #ccc;
    }

    .equipe span {
      color: #00ff88;
      font-weight: bold;
      font-size: 18px;
      animation: neon 1s infinite alternate;
    }

    @keyframes neon {
      from { text-shadow: 0 0 5px #00ff88; }
      to { text-shadow: 0 0 25px #00ff88; }
    }

    .headline {
      font-size: 15px;
      color: #ccc;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .proof {
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.3);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .live {
      font-size: 12px;
      color: #00ff88;
      margin-bottom: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* BOTÃO PRINCIPAL */
    .btn-primary {
      display: block;
      padding: 18px;
      margin: 20px 0;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      font-size: 17px;
      background: linear-gradient(45deg, #00ff88, #00cc66);
      color: black;
      animation: pulse 1s infinite;
      box-shadow: 0 0 30px rgba(0,255,136,1);
    }

    .btn-primary:hover {
      transform: scale(1.08);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* BOTÃO SUPORTE */
    .btn-secondary {
      display: block;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-size: 14px;
    }

    .btn-secondary:hover {
      background: #00ff88;
      color: black;
    }

    footer {
      margin-top: 25px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SUA IMAGEM -->
  <img src="https://i.imgur.com/6qE4Kzq.png" class="logo-img">

  <div class="equipe">
    Equipe <span>T</span>
  </div>

  <div class="headline">
    Trabalhamos com métodos <strong>zero riscos</strong><br>
    Especialistas em <strong>delay esportivo</strong>
  </div>

  <div class="proof">
    +937 membros 🚀<br>
    Vagas limitadas hoje
  </div>

  <div class="live">
    ● <span id="contador">12</span> pessoas acessando agora
  </div>

  <!-- BOTÃO WHATSAPP -->
  <a class="btn-primary" href="https://chat.whatsapp.com/HoIsLsVICoFIt0QWNgFjjn" target="_blank">
    💰 ENTRAR NA COMUNIDADE DO WHATSAPP
  </a>

  <!-- SUPORTE -->
  <a class="btn-secondary" href="https://wa.me/message/EF3UGFYGAMRUA1" target="_blank">
    📲 Suporte
  </a>

  <footer>
    © 2026 Toledo Métodos
  </footer>

</div>

<script>
  let numero = 12;

  setInterval(() => {
    let variacao = Math.floor(Math.random() * 3) - 1;
    numero += variacao;

    if (numero < 10) numero = 10;
    if (numero > 18) numero = 18;

    document.getElementById("contador").innerText = numero;
  }, 3000);
</script>

</body>
</html>
